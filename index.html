<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya - Posts Only</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

     <style>
        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.7); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px;
        }

        .container { width: 95%; max-width: 500px; margin: 0 auto; }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.1); 
            margin-bottom: 20px; 
            position: relative;
            backdrop-filter: blur(10px);
        }

        .card p {
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
            font-size: 16px;
            line-height: 1.5;
        }

        .p-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #1c1e21; }
        .user-info { display: flex; flex-direction: column; justify-content: center; }
        
        .action-bar { 
            display: flex; 
            justify-content: flex-end; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            padding-top: 15px; 
            margin-top: 15px; 
        }
        
        .download-btn { 
            background: var(--primary); 
            color: #000; 
            border: none;
            border-radius: 8px;
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 5px;
        }

        .watermark { 
            display: none; 
            font-size: 12px; 
            color: var(--primary); 
            opacity: 0.8; 
            text-align: right; 
            margin-top: 15px; 
            font-weight: bold; 
        }

        svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; color: var(--primary);">Feed</h2>
        <div id="feed">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration
        const conf = { 
            apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ", 
            authDomain: "the-jaya-by-ree.firebaseapp.com", 
            projectId: "the-jaya-by-ree" 
        };
        
        const app = initializeApp(conf);
        const db = getFirestore(app);

        // Load Posts
        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));

            onSnapshot(q, (s) => {
                const div = document.getElementById("feed"); 
                div.innerHTML = "";
                
                s.forEach(d => {
                    const p = d.data();
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.id = `post-card-${d.id}`;
                    el.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                            <img src="${p.pic || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="p-pic">
                            <div class="user-info">
                                <strong>@${p.username}</strong>
                            </div>
                        </div>
                        <p>${p.text}</p>
                        <div class="watermark">The Jaya • @${p.username}</div>
                        <div class="action-bar">
                            <button class="download-btn" onclick="downloadPost('${d.id}')">
                                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                                Download
                            </button>
                        </div>
                    `;
                    div.appendChild(el);
                });
            });
        }

        // Download Method
        window.downloadPost = async (postId) => {
            const postElement = document.getElementById(`post-card-${postId}`);
            const watermark = postElement.querySelector('.watermark');
            const actionBar = postElement.querySelector('.action-bar');
            
            // Layout adjust karein download ke liye
            watermark.style.display = 'block';
            actionBar.style.display = 'none';

            const canvas = await html2canvas(postElement, { 
                backgroundColor: '#030a1a', 
                scale: 2,
                useCORS: true // Images load karne ke liye zaroori hai
            });
            
            // Wapas normal karein
            watermark.style.display = 'none';
            actionBar.style.display = 'flex';

            const link = document.createElement('a');
            link.download = `TheJaya-${postId}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        };

        // Start loading
        loadFeed();
    </script>
</body>
</html>
