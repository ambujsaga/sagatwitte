<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jaya</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg?v=1.1">
    <link rel="apple-touch-icon" sizes="192x192" href="logo.jpg?v=1.1">
    <link rel="manifest" href="manifest.json">

     <style>
        /* --- ALL ORIGINAL CSS REMAINS SAME --- */
        @media (min-width: 768px) {
            .container { max-width: 700px; margin: 30px auto; }
            header { padding: 15px 10%; }
            .logo { font-size: 28px; }
            .card { padding: 25px; border-radius: 24px; transition: transform 0.2s ease; }
            .card:hover { border-color: var(--primary); }
            input, textarea { font-size: 16px; }
            .fab { right: 50px; bottom: 50px; width: 70px; height: 70px; }
            .p-pic { width: 50px; height: 50px; }
            .stats-grid { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; }
            #post-modal .container { max-width: 600px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--primary); }

        :root { 
            --primary: #00e5ff; 
            --bg: #030a1a; 
            --card-bg: rgba(6, 17, 39, 0.7); 
            --text-main: #ffffff; 
            --text-muted: #8a99b3;
            --star: #ffd700; 
            --red: #ff4444; 
            --neon-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        body.light-mode {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --primary: #008ad3;
            --neon-shadow: 0 4px 12px rgba(0, 138, 211, 0.2);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 100px; 
            overflow-x: hidden; 
            transition: background 0.3s ease;
        }

        header { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 229, 255, 0.15); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--primary); cursor: pointer; text-shadow: var(--neon-shadow); }
        .container { width: 95%; max-width: 500px; margin: 15px auto; }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.1); 
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        input, textarea { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            padding: 12px; 
            color: var(--text-main); 
            box-sizing: border-box; 
            outline: none; 
        }
        
        button { cursor: pointer; border: none; border-radius: 12px; padding: 10px 15px; font-weight: bold; }
        .btn-primary { background: var(--primary); color: #fff; width: 100%; box-shadow: var(--neon-shadow); }

        .p-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #1c1e21; }

        /* --- NEW RED TICK STYLES --- */
        .red-tick {
            color: var(--red);
            font-size: 14px;
            margin-left: 4px;
            font-weight: bold;
            display: inline-block;
        }

        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--red); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- LOADER --- */
        #loader-screen {
            position: fixed; inset: 0; background: #030a1a;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }

        .fab { position: fixed; bottom: 35px; right: 25px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: var(--neon-shadow); z-index: 2000; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <h1 class="logo">The Jaya</h1>
        <div style="width: 100px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 10px; overflow: hidden;">
            <div style="width: 100%; height: 100%; background: var(--primary); animation: load 2s linear;"></div>
        </div>
    </div>

    <div id="auth-section" style="display:none; text-align:center; padding-top:100px;">
        <h1 class="logo" style="font-size:45px;">The Jaya</h1>
        <button id="googleLogin" class="btn-primary" style="background:#fff; color:#000; width:auto; padding:12px 30px; margin-top:30px;">Login with Google</button>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="logo" onclick="navTo('home')">The Jaya</div>
            <img id="head-pic" class="p-pic" onclick="navTo('profile', true)" style="cursor:pointer; border:2px solid var(--primary);">
        </header>

        <div class="container">
            <div id="home-view"><div id="feed"></div></div>

            <div id="profile-view" style="display:none;" class="card">
                <div style="text-align:center;">
                    <img id="u-img" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
                    <h2 id="u-name">@username</h2>

                    <div id="verify-form" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin: 20px 0; text-align: left; border: 1px solid rgba(255,68,68,0.2);">
                        <p style="margin:0 0 10px 0; color: var(--red); font-weight: bold; font-size: 14px;">Red Tick Verification</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 13px;">Enable Verified Badge</span>
                            <label class="switch">
                                <input type="checkbox" id="verify-toggle" onchange="updateVerification()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <button onclick="logout()" style="background:var(--red); color:white; width:100%;">Logout</button>
                    <button onclick="navTo('home')" style="margin-top:10px; background: transparent; color: var(--text-muted);">Back</button>
                </div>
                <div id="u-feed"></div>
            </div>
        </div>

        <div id="fab-btn" class="fab" onclick="setPostModal(true)">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <div id="post-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center;">
        <div class="container"><div class="card">
            <h3>New Post</h3>
            <textarea id="postInput" rows="5" placeholder="What's happening?"></textarea>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-primary" onclick="doPost()">Post Now</button>
                <button onclick="setPostModal(false)" style="background:rgba(255,255,255,0.1); color:var(--text-main);">Cancel</button>
            </div>
        </div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const conf = { 
            apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ",
            authDomain: "the-jaya-by-ree.firebaseapp.com",
            projectId: "the-jaya-by-ree",
        };
        
        const app = initializeApp(conf);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gProv = new GoogleAuthProvider();
        let me = null;

        const RED_TICK_HTML = `<span class="red-tick">✔</span>`;

        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader-screen').style.display = 'none'; }, 2000);
        });

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                // Realtime monitor user data
                onSnapshot(doc(db, "users", u.uid), (snap) => {
                    if(snap.exists()) {
                        me = snap.data();
                        updateUI();
                    } else {
                        const un = u.displayName.replace(/\s+/g,'').toLowerCase() + Math.floor(Math.random()*99);
                        setDoc(doc(db, "users", u.uid), { username: un, uid: u.uid, pic: u.photoURL, isVerified: false });
                    }
                });
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('auth-section').style.display = 'none';
                navTo('home');
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        function updateUI() {
            if(!me) return;
            document.getElementById('head-pic').src = me.pic;
            document.getElementById('u-img').src = me.pic;
            document.getElementById('u-name').innerHTML = `@${me.username} ${me.isVerified ? RED_TICK_HTML : ''}`;
            document.getElementById('verify-toggle').checked = me.isVerified || false;
        }

        window.updateVerification = async () => {
            const status = document.getElementById('verify-toggle').checked;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { isVerified: status });
        };

        window.navTo = (v, isMe = true) => {
            document.getElementById('home-view').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('profile-view').style.display = v === 'profile' ? 'block' : 'none';
            if(v === 'home') loadFeed();
        };

        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snapshot.forEach(async (postDoc) => {
                    const p = postDoc.data();
                    
                    // Fetch post author verification status realtime
                    const userRef = doc(db, "users", p.uid);
                    const userSnap = await getDoc(userRef);
                    const isAuthorVerified = userSnap.exists() ? userSnap.data().isVerified : false;

                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                            <img src="${p.pic}" class="p-pic">
                            <strong>@${p.username} ${isAuthorVerified ? RED_TICK_HTML : ''}</strong>
                        </div>
                        <p>${p.text}</p>
                    `;
                    feed.appendChild(el);
                });
            });
        }

        window.doPost = async () => {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), { 
                text: t, 
                username: me.username, 
                pic: me.pic, 
                uid: me.uid, 
                time: Date.now() 
            });
            document.getElementById('postInput').value = ""; setPostModal(false);
        };

        window.setPostModal = (s) => document.getElementById('post-modal').style.display = s?'flex':'none';
        window.logout = () => { signOut(auth); location.reload(); };
        document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, gProv);
    </script>
</body>
</html>
