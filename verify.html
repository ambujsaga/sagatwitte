<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Naya Red Tick CSS */
        .red-tick { color: #ff4444; font-weight: bold; margin-left: 5px; }
        
        /* Toggle Switch Styling */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: #ff4444; }
        input:checked + .slider:before { transform: translateX(26px); }

        .admin-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--primary); margin-top: 20px; }
    </style>
</head>
<body>
    <div id="main-app" style="display:none;">
        <div class="container">
            <div id="profile-view" class="card">
                <div style="text-align:center;">
                    <img id="u-img" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--primary);">
                    <h2 id="u-name">@username <span id="admin-tick-preview"></span></h2>
                    
                    <div class="admin-box">
                        <h3>Admin Control Panel</h3>
                        <p style="font-size:12px; color:var(--text-muted);">Yahan se Red Tick control karein. Yeh live site par realtime dikhega.</p>
                        
                        <div style="display:flex; justify-content:space-between; align-items:center; margin: 20px 0;">
                            <span>Global Red Tick Status:</span>
                            <label class="switch">
                                <input type="checkbox" id="global-tick-toggle" onchange="syncTickToLiveSite()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <p id="sync-status" style="font-size:11px; color:var(--primary);"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration (Same as your project)
        const firebaseConfig = {
            apiKey: "AIzaSyAnpAuGPUKwptzhZmxtlt8LgS094tQ4ZGQ",
            authDomain: "the-jaya-by-ree.firebaseapp.com",
            projectId: "the-jaya-by-ree",
            storageBucket: "the-jaya-by-ree.firebasestorage.app",
            messagingSenderId: "367375685818",
            appId: "1:367375685818:web:75d9e504c4f347892b1156"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const tickHTML = `<span class="red-tick">✔</span>`;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('main-app').style.display = 'block';
                
                // Realtime Listener: Database se current status fetch karega
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('u-name').innerHTML = `@${data.username} ${data.isVerified ? tickHTML : ''}`;
                        document.getElementById('global-tick-toggle').checked = data.isVerified || false;
                        document.getElementById('u-img').src = data.pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                    }
                });
            }
        });

        // Yeh function data ko Firestore mein update karega jo live site par turant dikhega
        window.syncTickToLiveSite = async () => {
            const status = document.getElementById('global-tick-toggle').checked;
            const statusLabel = document.getElementById('sync-status');
            
            statusLabel.innerText = "Syncing with live site...";
            
            try {
                const userRef = doc(db, "users", auth.currentUser.uid);
                await updateDoc(userRef, {
                    isVerified: status
                });
                statusLabel.innerText = "✓ Live Site Updated Successfully!";
                setTimeout(() => { statusLabel.innerText = ""; }, 3000);
            } catch (error) {
                console.error("Sync Error:", error);
                statusLabel.innerText = "Error syncing data.";
            }
        };
    </script>
</body>
</html>
